management:
  endpoints:
    web:
      exposure:
        include: "*"

spring:
  mvc:
    locale: pt_BR

  messages:
    encoding: UTF-8

  profiles:
    active: ${PROFILE:dev}

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:none}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: reservation-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    tagsSorter: alpha
    operationsSorter: method
    disable-swagger-default-url: true
    path: /docs
    enabled: true

  api-docs:
    path: /docs
    enabled: true

  swagger-config:
    responses:
      error:
        401: "Invalid credentials"
        400: "Problem with the data in the request"
        403: "Request violates some authorization rule"
        404: "Resource requested not found"
        409: "Duplicated Resource"
        422: "Request violates some business rule"
        500: "Some unexpected error has occurred"
        502: "Service is unavailable at the moment"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer